# Based on Flegal2016 JAMA — NHANES 2013-2014
# =============================================================================

bmi:
  source_study: "NHANES 2013-2014"
  citation: Flegal2016
  definition_obesity_bmi_ge: 30.0
  definition_class3_obesity_bmi_ge: 40.0

  # Age-adjusted obesity prevalence (%) by race/sex — Flegal2016 Table 2
  obesity_prevalence_pct:
    NHW_women:
      obesity:       38.2
      ci_lower:      34.5
      ci_upper:      42.0
      class3_obesity: 8.9
      citation: Flegal2016_Table2
    NHB_women:
      obesity:       56.9
      ci_lower:      51.1
      ci_upper:      62.6
      class3_obesity: 16.8
      citation: Flegal2016_Table2
    Hispanic_women:
      obesity:       45.7
      ci_lower:      41.0
      ci_upper:      50.5
      class3_obesity: 7.7
      citation: Flegal2016_Table2
    NHW_men:
      obesity:       34.7
      ci_lower:      31.2
      ci_upper:      38.4
      class3_obesity: 5.0
      citation: Flegal2016_Table2
    NHB_men:
      obesity:       37.4
      ci_lower:      31.2
      ci_upper:      44.0
      class3_obesity: 7.0
      citation: Flegal2016_Table2
    Hispanic_men:
      obesity:       43.0
      ci_lower:      36.6
      ci_upper:      49.7
      class3_obesity: 5.5
      citation: Flegal2016_Table2

  # Additional BMI mean for midlife Black women from Simons2021 (FACHS)
  # Useful for Module 1 ALI BMI biomarker simulation in this demographic
  midlife_NHB_women_fachs:
    mean_bmi: 34.7
    sd_bmi:   8.8
    mean_age: 48.8
    source: "FACHS cohort"
    citation: Simons2021_Table1

# =============================================================================
# SECTION 6: RACIAL DISCRIMINATION & INFLAMMATION
# Based on Simons2021 FACHS (n=391 Black women, mean age 48.8)
# =============================================================================

racial_discrimination:
  source_study: "FACHS (Family and Community Health Study)"
  source_n: 391
  source_population: "African American women"
  source_mean_age: 48.8
  citation: Simons2021

  # Persistent racial discrimination exposure = 8-year measure
  # Inflammation = composite 7-cytokine index (IL-1β, IL-2, IL-5, IL-6,
  # IL-17, TNFα, MIP-1b); single factor; loadings 0.84–0.97

  # Path coefficient: racial discrimination → inflammation index
  discrimination_to_inflammation:
    beta:       0.114
    p_value:    0.05
    note: >
      8-year persistent racial discrimination exposure → inflammatory composite.
      Supports including discrimination as a direct upstream driver of
      allostatic load in the WeatheringNet causal DAG.
    citation: Simons2021

  # Path coefficient: inflammation → chronic disease count (Poisson/IRR)
  inflammation_to_chronic_disease:
    irr:        1.251   # incidence rate ratio per SD increase in inflammation
    p_value:    0.01
    citation: Simons2021

  # SES → chronic disease — from ZIP (zero-inflated Poisson) model in Simons2021
  # See DECISION-017 for full interpretation.
  #
  # CRITICAL: Two-component result — SES affects susceptibility ONLY, not burden:
  #   Binary component (susceptibility gate): OR = 21.073, p < 0.01  [USE THIS]
  #   Count component (disease burden):       NOT SIGNIFICANT         [NO PATH]
  #
  # The count-component null is a confirmed reported finding from Simons (2021) Results,
  # not a missing value. SES does not predict number of diseases once at-risk; that
  # pathway runs through inflammation (IRR = 1.251). See DECISION-017.
  ses_to_chronic_disease:
    zip_binary_or: 21.073
    zip_binary_p_value: 0.01
    zip_binary_or_interpretation: >
      Odds of being in the at-risk (non-structural-zero) class per 1 SD increase
      in standardized SES composite (education + income). From binary (inflation)
      component of ZIP model in MPlus 8.0. NOT a standard logistic OR. Use only
      as susceptibility gate in two-part synthetic disease assignment.
    zip_count_ses_irr: null          # explicitly null — non-significant in Simons2021
    zip_count_ses_note: >
      "The path from SES to the count variable (number of illnesses) is not
      [significant]." — Simons et al. (2021) Results, p.11. Do not add a SES
      path to the count model. Disease count accumulation runs through inflammation.
    ses_variable_construction: >
      2-item composite: education (0=less than HS to 5=postbaccalaureate) +
      household income (continuous, all sources, all family members), both
      z-scored then averaged. Unit = 1 SD of composite. Simons (2021) Methods.
    citation: Simons2021

  # Chronic disease count distribution — calibration target for synthetic generator
  # Source: Simons2021 Results, n=391 FACHS Black women, Wave 5
  chronic_disease_count_distribution:
    n: 391
    pct_0_diseases: 52.9   # 207/391 — structural + at-risk zeros combined
    pct_1_disease:  30.7   # 120/391
    pct_2_diseases:  8.4   # 33/391
    pct_3plus:       8.4   # 33/391 — upper tail pooled; exact maximum unknown
    note: >
      Use these proportions as calibration targets for the ZIP synthetic outcome.
      Simulated chronic disease counts should match these marginals within ±3 pp.
    citation: Simons2021_Results

  # Chronic disease prevalence in FACHS midlife Black women — Simons2021
  chronic_disease_prevalence_fachs:
    pct_arthritis:        33.0
    pct_diabetes:         15.0
    pct_heart_problems:   10.0
    pct_any_chronic:      47.0
    citation: Simons2021

# =============================================================================
# SECTION 7: AUTOIMMUNE DISEASE (AID) OUTCOMES
# Based on Roberts2020 (nationwide rates) and Brew2022 (transgenerational)
# =============================================================================

autoimmune_disease:

  # --- 7a. Population-level AID prevalence & race ratios ---
  # Source: Roberts2020 — U.S. AID rates 2010-2016
  prevalence:
    source: "U.S. NCHS / insurance claims 2010-2016"
    citation: Roberts2020

    # Approximate prevalence rates per 100,000 population — Roberts2020
    rates_per_100k:
      SLE:
        overall: 74.0
        citation: Roberts2020
      crohns_disease:
        overall: 80.0
        citation: Roberts2020
      note: >
        RA and MS rates in Roberts2020 are reported as comparison figures;
        exact per-100k values for all conditions should be extracted from
        Roberts2020 Figure 3 at time of NHANES validation phase.

    # Race-specific rate ratios vs. Caucasian (reference = 1.0) — Roberts2020 Figure 4
    race_rate_ratios:
      African_American_vs_Caucasian:
        SLE:        2.15   # midpoint of reported ~2.1–2.2x range
        RA:         1.0    # approximately equivalent per Roberts2020
        polymyositis_dermatomyositis: 2.0
        citation: Roberts2020_Figure4
      Native_American_vs_Caucasian:
        RA:                    2.4
        alopecia_areata:       5.5   # midpoint of 5–6x range
        primary_biliary_cirrhosis: 3.0
        citation: Roberts2020_Figure4

  # --- 7b. Transgenerational autoimmune disease risk ---
  # Source: Brew2022 Swedish cohort (n=453,516, 3 generations)
  transgenerational:
    source_study: "Swedish multi-generation cohort"
    source_n: 453516
    citation: Brew2022

    # G2→G3 transgenerational effects via parental childhood bereavement (stress proxy)
    # Outcome: G3 offspring autoimmune disease or early-onset asthma

    paternal_childhood_bereavement_to_G3_autoimmune:
      hr:        1.31
      ci_lower:  1.06
      ci_upper:  1.62
      outcome:   "offspring autoimmune diseases (onset ≥ 3 years)"
      note: >
        Not mediated by SES or mood disorders in adjusted model.
        This is the key parameter motivating WeatheringNet's G2→G3
        transgenerational edge in the causal DAG.
      citation: Brew2022

    maternal_childhood_bereavement_to_G3_early_asthma:
      hr:        1.15
      ci_lower:  1.08
      ci_upper:  1.23
      outcome:   "offspring early-onset asthma (onset < 3 years)"
      pct_mediated_by_ses:    0.305   # 28–33% range midpoint
      pct_mediated_by_mood:   0.145   # 9–20% range midpoint
      citation: Brew2022

    # G3 autoimmune disease incidence rates — Brew2022
    G3_AID_incidence:
      rate_per_1000_person_years_overall:   1.4
      rate_per_1000_person_years_onset_ge3: 1.5
      citation: Brew2022

# =============================================================================
# SECTION 8: PRENATAL STRESS → OFFSPRING T1D
# Based on Lundgren2018 DiPiS study (n=23,187, Sweden)
# =============================================================================

prenatal_stress_T1D:
  source_study: "DiPiS (Diabetes Prediction in Skåne)"
  source_n_2mo:  23187
  source_n_2yr:  3784
  citation: Lundgren2018

  # Exposure: severe life events (SLEs) in first 2 years of child's life
  # Outcome: T1D diagnosis
  # Method: Cox proportional hazards, adjusted for FDRs, HLA-DQ risk,
  #         paternal education, parents' country of birth

  T1D_risk_any_SLE:
    total_cohort:
      hr:        1.67
      ci_lower:  1.1
      ci_upper:  2.7
      p_value:   0.03
      note: "SLEs during child's first 2 years → T1D in total DiPiS cohort"
      citation: Lundgren2018
    DQ28_high_risk_cohort:
      hr:        2.2
      ci_lower:  1.1
      ci_upper:  4.2
      p_value:   0.018
      note: >
        Stronger effect in HLA-DQ2/8 high-risk genetic subgroup.
        Suggests stress-gene interaction on T1D risk.
      citation: Lundgren2018

  # Subgroup: socioeconomic SLEs (unemployment, divorce, family conflict)
  # occurring during pregnancy — DQ2/8 cohort
  T1D_risk_socioeconomic_SLE_during_pregnancy:
    DQ28_cohort:
      hr:        2.17
      ci_lower:  1.1
      ci_upper:  4.3
      p_value:   0.03
      note: >
        This is the parameter closest to the HR=2.16 cited in Foster (2023).
        Socioeconomic severe life events (unemployment, divorce, family
        conflict) during pregnancy → T1D in HLA high-risk offspring.
        Directly relevant to WeatheringNet's maternal stress → offspring
        autoimmune disease causal pathway.
      citation: Lundgren2018

  # After-pregnancy SLEs in total cohort
  T1D_risk_socioeconomic_SLE_after_pregnancy:
    total_cohort:
      hr:        2.07
      ci_lower:  1.01
      ci_upper:  4.2
      p_value:   0.047
      citation: Lundgren2018
    DQ28_cohort:
      hr:        4.98
      ci_lower:  2.3
      ci_upper:  11.0
      p_value:   0.001
      note: >
        Very large HR for post-pregnancy SLEs in genetic high-risk group.
        Treat as upper-bound sensitivity scenario in simulation.
      citation: Lundgren2018

# =============================================================================
# SECTION 9: SIMULATION CONTROL PARAMETERS
# Technical parameters for synthetic data generation
# (These are design choices, not literature-derived; document in DECISIONS.md)
# =============================================================================

simulation:
  random_seed: 42
  n_bootstrap_samples: 1000   # for confidence interval estimation on synthetic data
  train_test_split: 0.8

  # Biomarker generation approach
  # Each biomarker is drawn from a race/sex/age-stratified distribution
  # parameterized from Section 2 (ALI thresholds) and Sections 3–5.
  biomarker_distribution: "log_normal"   # log-normal approximates right-skewed
                                         # biomarker distributions (Geronimus2006)
  enforce_threshold_prevalence: true     # scale biomarker draws so that pct_high_score
                                         # matches Table 1 values from Geronimus2006

  # Causal path coefficients to apply in structural equation model
  # for outcome generation. These are calibrated to match reported ORs/HRs.
  # Final calibration documented in docs/DECISIONS.md
  dag_path_weights:
    racial_discrimination_to_inflammation: 0.114     # Simons2021
    inflammation_to_chronic_disease_irr:   1.251     # Simons2021
    prenatal_stress_to_offspring_T1D_hr:   2.17      # Lundgren2018 (DQ2/8 subgroup)
    bereavement_to_offspring_AID_hr:       1.31      # Brew2022
    allostatic_load_age_race_or:
      NHB_women_25_34: 2.3   # Geronimus2006 Table 2
      NHB_women_35_44: 2.2
      NHB_women_45_54: 2.0
      NHB_women_55_64: 1.9
      NHB_men_25_34:   1.5
      NHB_men_35_44:   1.5
      NHB_men_45_54:   1.4
      NHB_men_55_64:   1.4

