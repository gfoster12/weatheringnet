# =============================================================================
# WeatheringNet Synthetic Data Parameters
# =============================================================================
# Purpose: Parameterize synthetic cohort generation from published literature.
#          Every numeric value must trace to a citeable source.
#          NHANES microdata not used; this enables fully self-contained
#          `make reproduce-paper` without data-access agreements.
#
# Maintainer: Gabrielle Foster <https://orcid.org/0000-0003-2620-1065>
# Last updated: 2026-03-09
# Schema version: 0.2.0
#
# Citation key format: AuthorYYYY
# Full references in docs/references.bib
# =============================================================================

metadata:
  schema_version: "0.2.0"
  project: "WeatheringNet"
  description: >
    Parameters for synthetic cohort simulation study. Values derived from
    published summary statistics; not raw microdata. Simulation approach
    follows precedent of Foster (2023), parameterized from six uploaded
    source papers and two targeted literature searches.
  primary_sources:
    - key: Geronimus2006
      citation: >
        Geronimus AT, Hicken M, Keene D, Bound J. "Weathering" and age
        patterns of allostatic load scores among Blacks and Whites in the
        United States. Am J Public Health. 2006;96(5):826–833.
        doi:10.2105/AJPH.2004.060749
      data_used: [ALI_thresholds, ALI_score_distributions, race_odds_ratios]
    - key: Roberts2020
      citation: >
        Roberts MH, Erdei E. Comparative United States autoimmune disease
        rates for 2010–2016 by sex, geographic region, and race. Autoimmun
        Rev. 2020;19(1):102423. doi:10.1016/j.autrev.2019.102423
      data_used: [AID_prevalence_rates, AID_race_ratios]
    - key: Khera2005
      citation: >
        Khera A, McGuire DK, Murphy SA, et al. Race and gender differences
        in C-reactive protein levels. J Am Coll Cardiol. 2005;46(3):464–469.
        doi:10.1016/j.jacc.2005.04.051
      data_used: [CRP_distributions_by_race_sex, CRP_odds_ratios]
    - key: Suglia2010
      citation: >
        Suglia SF, Staudenmayer J, Cohen S, Enlow MB, Rich-Edwards JW,
        Wright RJ. Cumulative stress and cortisol disruption among Black and
        Hispanic pregnant women in an urban cohort. Psychol Trauma.
        2010;2(4):326–334. doi:10.1037/a0018953
      data_used: [cortisol_by_race_stress, stress_prevalence_pregnant]
    - key: Brew2022
      citation: >
        Brew BK, Lundholm C, Vieira AR, Almqvist C. Early-life adversity due
        to bereavement and risk of inflammatory diseases in the next
        generation. Am J Epidemiol. 2022;191(1):38–48.
        doi:10.1093/aje/kwab208
      data_used: [transgenerational_autoimmune_HR, AID_incidence_rates]
    - key: Simons2021
      citation: >
        Simons RL, Lei MK, Klopack E, Beach SR, Gibbons FX, Philibert RA.
        Racial discrimination, inflammation, and chronic illness among African
        American women at midlife: support for the weathering perspective.
        J Racial Ethn Health Disparities. 2021;8(2):339–349.
        doi:10.1007/s40615-020-00786-8
      data_used: [discrimination_inflammation_beta, inflammation_chronic_IRR,
                  BMI_midlife_Black_women, chronic_disease_prevalence]
    - key: Flegal2016
      citation: >
        Flegal KM, Kruszon-Moran D, Carroll MD, Fryar CD, Ogden CL. Trends
        in obesity among adults in the United States, 2005 to 2014. JAMA.
        2016;315(21):2284–2291. doi:10.1001/jama.2016.6458
      data_used: [obesity_prevalence_by_race_sex]
    - key: Lundgren2018
      citation: >
        Lundgren M, Ellström K, Elding Larsson H; DiPiS study group.
        Influence of early-life parental severe life events on the risk of
        type 1 diabetes in children: the DiPiS study. Acta Diabetol.
        2018;55(8):797–804. doi:10.1007/s00592-018-1150-y
      data_used: [T1D_stress_hazard_ratio]

# =============================================================================
# SECTION 1: POPULATION DEMOGRAPHICS
# Parameters for synthetic cohort composition
# =============================================================================

population:
  n_synthetic: 10000   # development/iteration runs — see DECISION-025
  n_synthetic_paper: 50000  # final paper run; override via: make reproduce-paper N=50000
  # DECISION-025: power analysis confirms n=10k adequate for analyses A,C,D,G;
  # n=50k required for E (transgenerational AID HR=1.31) and F (DQ2/8 T1D HR=2.17).
  # Analysis B (SLE individual RR) is underpowered at any feasible n; use composite AID.
  target_age_range: [20, 65]

  race_sex_strata:
    # Strata labels match NHANES convention used in Geronimus2006
    # Proportions reflect approximate NHANES IV (1999-2002) adult distribution
    # used in Geronimus2006; exact proportions are analytic weights not reported
    # as marginals, so proportions below are derived from U.S. Census 2000
    # adult distribution as a reasonable approximation.
    NHB_women:
      label: "Non-Hispanic Black Women"
      approx_population_fraction: 0.068  # Census 2000 approximation
    NHB_men:
      label: "Non-Hispanic Black Men"
      approx_population_fraction: 0.059
    NHW_women:
      label: "Non-Hispanic White Women"
      approx_population_fraction: 0.356
    NHW_men:
      label: "Non-Hispanic White Men"
      approx_population_fraction: 0.342
    Hispanic_women:
      label: "Hispanic Women"
      approx_population_fraction: 0.085
    Hispanic_men:
      label: "Hispanic Men"
      approx_population_fraction: 0.090

  age_groups:
    # Age groupings from Geronimus2006 Table 1 (10-year bands, 25-64)
    young_adult: [25, 34]
    mid_adult:   [35, 44]
    mid_late:    [45, 54]
    older_adult: [55, 64]

# =============================================================================
# SECTION 2: ALLOSTATIC LOAD INDEX (ALI)
# Based on Geronimus2006 NHANES IV 10-biomarker algorithm
# =============================================================================

allostatic_load:
  biomarker_algorithm: "Geronimus2006_NHANES_IV"
  n_biomarkers: 10
  # Source: Geronimus et al. (2006) Table 1 footnote — high-risk thresholds
  # defined as quartile-based cut-points from NHANES IV reference population

  biomarker_thresholds:
    # Each threshold defines the "high-risk" cut-point (≥ or ≤ as indicated)
    # Direction: "above" = high-risk if value exceeds threshold
    #            "below" = high-risk if value falls below threshold
    # Source for all thresholds: Geronimus2006, Table 1 footnote

    systolic_bp:
      unit: "mmHg"
      high_risk_above: 127
      citation: Geronimus2006

    diastolic_bp:
      unit: "mmHg"
      high_risk_above: 80
      citation: Geronimus2006

    bmi:
      unit: "kg/m2"
      high_risk_above: 30.9
      citation: Geronimus2006

    hba1c:
      unit: "percent"
      high_risk_above: 5.4
      citation: Geronimus2006

    albumin:
      unit: "g/dL"
      high_risk_below: 4.2    # low albumin = high risk
      citation: Geronimus2006

    creatinine_clearance:
      unit: "mg/dL"           # note: Geronimus2006 uses mg/dL
      high_risk_below: 66
      citation: Geronimus2006

    triglycerides:
      unit: "mg/dL"
      high_risk_above: 168
      citation: Geronimus2006

    crp:
      unit: "mg/dL"
      high_risk_above: 0.41   # = ~4.1 mg/L; Geronimus uses mg/dL convention
      citation: Geronimus2006

    homocysteine:
      unit: "micromol/L"
      high_risk_above: 9.0
      citation: Geronimus2006

    total_cholesterol:
      unit: "mg/dL"
      high_risk_above: 225
      citation: Geronimus2006

  # ALI score = count of biomarkers in high-risk range (0–10)
  # High ALI defined as score ≥ 4 (Geronimus2006)
  high_ali_cutoff: 4

  score_distributions:
    # Source: Geronimus2006 Table 1
    # Mean ALI score and % with high score (≥4) by race/sex/age group
    # Age groups: 25-34, 35-44, 45-54, 55-64

    NHB_women:
      age_25_34:
        mean_score: 1.8
        pct_high_score: 16.0   # % with ALI ≥ 4
        citation: Geronimus2006_Table1
      age_35_44:
        mean_score: 2.7
        pct_high_score: 30.0
        citation: Geronimus2006_Table1
      age_45_54:
        mean_score: 3.5
        pct_high_score: 45.0
        citation: Geronimus2006_Table1
      age_55_64:
        mean_score: 4.0
        pct_high_score: 56.0
        citation: Geronimus2006_Table1

    NHW_women:
      age_25_34:
        mean_score: 1.2
        pct_high_score: 8.0
        citation: Geronimus2006_Table1
      age_35_44:
        mean_score: 1.8
        pct_high_score: 16.0
        citation: Geronimus2006_Table1
      age_45_54:
        mean_score: 2.5
        pct_high_score: 24.0
        citation: Geronimus2006_Table1
      age_55_64:
        mean_score: 3.0
        pct_high_score: 35.0
        citation: Geronimus2006_Table1

    NHB_men:
      age_25_34:
        mean_score: 1.5
        pct_high_score: 11.0
        citation: Geronimus2006_Table1
      age_35_44:
        mean_score: 2.1
        pct_high_score: 21.0
        citation: Geronimus2006_Table1
      age_45_54:
        mean_score: 2.9
        pct_high_score: 31.0
        citation: Geronimus2006_Table1
      age_55_64:
        mean_score: 3.5
        pct_high_score: 41.0
        citation: Geronimus2006_Table1

    NHW_men:
      age_25_34:
        mean_score: 1.3
        pct_high_score: 9.0
        citation: Geronimus2006_Table1
      age_35_44:
        mean_score: 2.0
        pct_high_score: 17.0
        citation: Geronimus2006_Table1
      age_45_54:
        mean_score: 2.6
        pct_high_score: 26.0
        citation: Geronimus2006_Table1
      age_55_64:
        mean_score: 3.1
        pct_high_score: 36.0
        citation: Geronimus2006_Table1

  # Race odds ratios for high ALI score (≥4) vs NHW same sex
  # Source: Geronimus2006 Table 2
  # These are RELATIVE ODDS RATIOS age-adjusted within sex
  race_odds_ratios:
    NHB_vs_NHW_women:
      or_25_34: 2.3
      or_35_44: 2.2
      or_45_54: 2.0
      or_55_64: 1.9
      note: >
        Weathering pattern: Black-White OR narrows at older ages but Black
        women maintain significantly higher ALI burden across all age groups.
      citation: Geronimus2006_Table2

    NHB_vs_NHW_men:
      or_25_34: 1.5
      or_35_44: 1.5
      or_45_54: 1.4
      or_55_64: 1.4
      note: >
        Race gap in ALI is smaller for men than women, consistent with
        the weathering hypothesis being particularly pronounced in women.
      citation: Geronimus2006_Table2

# =============================================================================
# SECTION 3: C-REACTIVE PROTEIN (CRP)
# Based on Khera2005 Dallas Heart Study (n=2,749, ages 30–65)
# =============================================================================

crp:
  source_study: "Dallas Heart Study"
  source_n: 2749
  source_age_range: [30, 65]
  citation: Khera2005

  unit: "mg/L"
  clinical_high_risk_threshold: 3.0   # American Heart Association high-risk cutoff

  # Median CRP by race/sex — Khera2005 Figure 2
  median_by_race_sex:
    NHW_men:    1.7
    NHB_men:    2.1
    NHW_women:  3.3
    NHB_women:  3.5
    citation: Khera2005_Figure2

  # Percent with CRP > 3 mg/L — Khera2005 Table 4 (sample-weight adjusted)
  pct_above_3_by_race_sex:
    NHW_men:
      pct: 30.9
      citation: Khera2005_Table4
    NHB_men:
      pct: 39.7
      citation: Khera2005_Table4
    NHW_women:
      pct: 51.2
      citation: Khera2005_Table4
    NHB_women:
      pct: 57.5
      citation: Khera2005_Table4

  # Adjusted odds ratios vs NHW men (reference) — Khera2005 Table 4
  # Full covariate adjustment (age, BMI, smoking, physical activity, alcohol,
  # waist circumference, lipid-lowering medications, hormone use in women)
  adjusted_or_vs_NHW_men:
    NHB_men:
      or: 1.4
      ci_lower: 0.9
      ci_upper: 2.1
      p_value: 0.10        # not statistically significant after full adjustment
      citation: Khera2005_Table4
    NHW_women:
      or: 1.6
      ci_lower: 1.1
      ci_upper: 2.5
      p_value: 0.02
      citation: Khera2005_Table4
    NHB_women:
      or: 1.7
      ci_lower: 1.2
      ci_upper: 2.6
      p_value: 0.007
      citation: Khera2005_Table4

  # BMI-CRP note: Khera2005 reports BMI correlation with CRP stronger in women
  bmi_crp_correlation_sex_moderation:
    stronger_in_women: true
    NHB_women_mean_bmi: 33.0   # kg/m2 — Khera2005 Table 1
    citation: Khera2005

# =============================================================================
# SECTION 4: CORTISOL & PRENATAL STRESS
# Based on Suglia2010 ACCESS cohort (n=200, ~28 weeks gestation)
# Population: Black and Hispanic pregnant women, urban Boston
# =============================================================================

cortisol_prenatal:
  source_study: "ACCESS cohort"
  source_n: 200
  source_gestational_age_weeks: 28   # approximate
  citation: Suglia2010
  unit: "nmol/L"

  # Salivary cortisol collection protocol: Time 1 = awakening, Time 2 = 45 min post-wake
  # Diurnal slope = Time 1 minus Time 2 (positive = expected morning rise)

  morning_cortisol_by_race:
    # Time 1 (awakening) cortisol — Suglia2010 Table 2
    Black_women:
      time1_mean: 14.9
      time1_sd:   9.1
      time2_mean: 15.7
      time2_sd:   9.8
      diurnal_slope_mean: -1.43   # negative = blunted slope (T2 > T1 on average)
      diurnal_slope_sd:   0.9
      citation: Suglia2010_Table2
    Hispanic_women:
      time1_mean: 15.9
      time1_sd:   7.8
      time2_mean: 17.5
      time2_sd:   9.7
      diurnal_slope_mean: -1.73
      diurnal_slope_sd:   0.8
      citation: Suglia2010_Table2

  # Cumulative stress prevalence by race — Suglia2010 Table 1
  # Three-level stress classification: low / medium / high
  cumulative_stress_prevalence:
    Black_women:
      pct_low_stress:    24.0
      pct_medium_stress: 35.0
      pct_high_stress:   41.0
      citation: Suglia2010_Table1
    Hispanic_women:
      pct_low_stress:    57.0
      pct_medium_stress: 30.0
      pct_high_stress:   13.0
      citation: Suglia2010_Table1

  # Stress → cortisol regression coefficients — Suglia2010 Table 3
  # Among Black women only; no significant association in Hispanic women
  stress_cortisol_regression_Black_women:
    time1_beta:          -0.1913   # high stress → lower morning cortisol
    time1_p_value:        0.05
    time2_beta:          -0.1999
    time2_p_value:        0.05
    diurnal_slope_beta:   0.2459   # high stress → flatter slope (less decline)
    diurnal_slope_p:      0.05
    note: >
      Betas are standardized. Positive beta for diurnal slope indicates
      flatter (blunted) diurnal cortisol rhythm under high cumulative stress.
      Consistent with HPA axis dysregulation under chronic stress load.
    citation: Suglia2010_Table3

  stress_cortisol_regression_Hispanic_women:
    association_significant: false
    note: >
      No significant association between cumulative stress and cortisol
      in Hispanic women in Suglia2010. May reflect different stress typology,
      coping resources, or measurement of stress across groups.
    citation: Suglia2010

# =============================================================================
