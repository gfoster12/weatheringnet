repos:
  - repo: https://github.com/psf/black
    rev: 26.3.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML]
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        entry: mypy weatheringnet/

  - repo: local
    hooks:
      - id: no-data-files
        name: Block data files from being committed
        entry: "bash -c 'echo Data files must not be committed. Use DVC instead. && exit 1'"
        language: system
        types_or: [file]
        files: "\\.(xpt|parquet|csv|sas7bdat)$"
